<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Bildsuche</ion-title>          
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Bildsuche</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-item>
    <ion-label position="stacked">Suchbegriff</ion-label>
    <ion-input
      [(ngModel)]="suchbegriffEingabe"
      placeholder="z.B. Brandenburger Tor"
      clearInput="true"
    ></ion-input>
  </ion-item>

  <ion-item *ngIf="fehlermeldung?.trim()" lines="none">
    <ion-note color="danger">{{ fehlermeldung }}</ion-note>
  </ion-item>

  <ion-grid>
    <ion-row>
      <ion-col size="6">
        <ion-button expand="block" (click)="onSuchenButton()">Suchen</ion-button>
      </ion-col>
      <ion-col size="6">
        <ion-button expand="block" 
                    fill="outline" 
                    (click)="onZuruecksetzenButton()">Zurücksetzen</ion-button>
      </ion-col>
    </ion-row>
  </ion-grid>

  <ion-item lines="none">
    <ion-note>Mehrfach auf "Suchen" klicken, um weitere Bilder anzuzeigen.</ion-note>
  </ion-item>  

  &nbsp;
  
  <ion-img [src]="bildUrl || 'assets/icon/favicon.png'"></ion-img>
  <!-- assets/icon/favicon.png ist Default-Bild -->

</ion-content>
