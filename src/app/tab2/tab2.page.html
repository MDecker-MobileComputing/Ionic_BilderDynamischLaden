<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Einstellungen</ion-title>          
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Einstellungen</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-list>

    <ion-item>
      <ion-input
        label="API-Key für flickr"
        labelPlacement="stacked"
        type="password"
        [(ngModel)]="apiKey"
      ></ion-input>
    </ion-item>

    <ion-item lines="none">
      <ion-button expand="block" (click)="onApiKeyPruefenButton()">
        API-Key prüfen und speichern
      </ion-button>
    </ion-item>

    <ion-item class="einstellung-block-abstand-oben">
      <div class="range-container">
        <ion-label>
          Anzahl Bilder pro Seite: {{ anzahlBilderProSeite }}
        </ion-label>
        <ion-range
          min="5"
          max="50"
          step="1"
          snaps="false"
          pin="false"
          [(ngModel)]="anzahlBilderProSeite"
          (ionChange)="onAnzahlBilderProSeiteGeaendert()"
          color="primary"
        ></ion-range>
      </div>
    </ion-item>

    <ion-item *ngIf="meldungApiKey" lines="none">
      <ion-note [color]="meldungIstFehler ? 'danger' : 'success'">{{ meldungApiKey }}</ion-note>
    </ion-item>

  </ion-list>

</ion-content>
