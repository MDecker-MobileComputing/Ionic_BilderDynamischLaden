<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Einstellungen</ion-title>          
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Einstellungen</ion-title>
    </ion-toolbar>
  </ion-header>


  <ion-list>

    <ion-item>
      <ion-input
        label="API-Key für flickr"
        labelPlacement="stacked"
        type="password"
        [(ngModel)]="apiKey"
      ></ion-input>
    </ion-item>

    <ion-item lines="none">
      <ion-button expand="block" (click)="onApiKeyPruefenButton()">
        API-Key prüfen und speichern
      </ion-button>
    </ion-item>

    <ion-item *ngIf="meldungApiKey" lines="none">
      <ion-note [color]="meldungIstFehler ? 'danger' : 'success'">{{ meldungApiKey }}</ion-note>
    </ion-item>
    
  </ion-list>

</ion-content>
